<h2>Register</h2>

<style>
  /* Simple vertical stack with spacing */
  .form-group {
    display: flex;
    flex-direction: column;
    max-width: 300px;  /* optional, limits width */
  }

  .form-group input,
  .form-group button {
    margin-bottom: 12px;
    padding: 8px;
    font-size: 1rem;
  }

  .login-button {
    margin-top: 8px;
    background: #007BFF;
    color: white;
    border: none;
    cursor: pointer;
  }

  .login-button:hover {
    background: #0056b3;
  }
</style>

<div class="form-group">
  <input id="name" placeholder="Name" />
  <input id="email" placeholder="Email" />
  <input id="phone" placeholder="Phone" />
  <input id="address" placeholder="Address" />
  <input id="api_key" placeholder="API Token" />
  <input id="password" placeholder="Password" type="password" />

  <button onclick="register()">Register</button>
  <!-- Added login button -->
  <button onclick="window.location='login.html'">Login</button>

  <p id="msg"></p>
</div>

<script src="script.js"></script>
