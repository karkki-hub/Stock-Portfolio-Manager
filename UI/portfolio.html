<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
</head>
<body>

<h1>My Portfolio</h1>

<div>
  <p>Total Investment: <span id="totalInvestment"></span></p>
  <p>Current Value: <span id="currentValue"></span></p>
  <p>Total P/L: <span id="totalPL"></span></p>
</div>

<h2>Stocks</h2>
<table border="1">
  <thead>
    <tr>
      <th onclick="sortStocks('symbol')">
  Symbol <span id="arrow-symbol"></span>
</th>
<th onclick="sortStocks('quantity')">
  Quantity <span id="arrow-quantity"></span>
</th>
<th onclick="sortStocks('avg_buy_price')">
  Avg Price <span id="arrow-avg_buy_price"></span>
</th>
<th onclick="sortStocks('current_price')">
  Current Price <span id="arrow-current_price"></span>
</th>
<th onclick="sortStocks('profit_loss')">
  Value Difference <span id="arrow-profit_loss"></span>
</th>
<th>P/L</th>
    </tr>
  </thead>
  <tbody id="stockTable"></tbody>
</table>
<button onclick="window.location='watchlist.html'">Back to Watchlist</button>
<script src="script.js"></script>
<script>
    loadPortfolio()
</script>
</body>
</html>
